name: Prueba calculadora
on:
  push
jobs:
  calculadora-job:
    runs-on: ubuntu-latest
    steps:
    - name: Cancel build runs
      uses: styfle/cancel-workflow-action@0.12.1
      with:
        workflow_id: calculadora.yaml
    - name: clonar repositorio
      uses: actions/checkout@v4
    - name: probar operacion
      run: |
        echo "Probar operacion suma"
        echo "Instalar node.js
        sudo apt-get update && sudo apt-get install -y nodejs npm
        echo "crear archivo de pruebas"
        echo "const calc = require('./calculadora'); console.log('Suma 2+3:', calc.sumar(2,3));" >test.js
        node test.js
